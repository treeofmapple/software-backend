name: CI/CD Pipeline for Project Backend

on:
  # push:
  #  branches:
  #     - '**'
  pull_request:
    branches:
      - develop/**
      - feature/**
      # - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        if: ${{ github.event_name == 'pull_request' }}
        run: mvn -B verify

