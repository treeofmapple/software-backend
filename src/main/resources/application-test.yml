spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

security:
  tokens:
    base-path: ${KEYS_PATH:keys}
    expiration: ${EXPIRATION_KEY:15m}
    refresh-token: ${REFRESH_KEY:7d}
      
      
application:
  cors:
    allowed-origins: "*"