spring:
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT}/${DB_DATABASE:example}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      max-lifetime: 1500000
      idle-timeout: 300000
      connection-timeout: 30000
      minimum-idle: 10
      maximum-pool-size: 100
      pool-name: "ProdDBPool"
      initialization-fail-timeout: -1
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update

security:
  tokens:
    base-path: ${KEYS_PATH}
    expiration: ${EXPIRATION_KEY:15m}
    refresh-token: ${REFRESH_KEY:7d}
      
application:
  size:
    page: ${PAGE_SIZE:20}

settings:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
    max-age: ${CORS_TIME:3600}
  security:
    user: ${ADMIN_USER}
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}
